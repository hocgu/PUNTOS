<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #3D182D;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            opacity: 0.7;
        }

        .star svg {
            display: block;
            color: #FF8A8A;
        }

        @keyframes subtleRotate1 {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(15deg); }
        }

        @keyframes subtleRotate2 {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(-12deg); }
        }

        @keyframes subtleRotate3 {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(10deg); }
        }

        @keyframes subtleRotate4 {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(-15deg); }
        }

        .star:nth-child(1) { animation: subtleRotate1 7s ease-in-out infinite; }
        .star:nth-child(2) { animation: subtleRotate2 5s ease-in-out infinite 0.5s; }
        .star:nth-child(3) { animation: subtleRotate3 9s ease-in-out infinite 1s; }
        .star:nth-child(4) { animation: subtleRotate4 6s ease-in-out infinite 1.5s; }
        .star:nth-child(5) { animation: subtleRotate1 8s ease-in-out infinite 2s; }
        .star:nth-child(6) { animation: subtleRotate2 10s ease-in-out infinite 0.8s; }
        .star:nth-child(7) { animation: subtleRotate3 6.5s ease-in-out infinite 2.5s; }
        .star:nth-child(8) { animation: subtleRotate4 7.5s ease-in-out infinite 1.2s; }
        .star:nth-child(9) { animation: subtleRotate1 5.5s ease-in-out infinite 3s; }
        .star:nth-child(10) { animation: subtleRotate2 8.5s ease-in-out infinite 0.3s; }
        .star:nth-child(11) { animation: subtleRotate3 4s ease-in-out infinite 2.2s; }
        .star:nth-child(12) { animation: subtleRotate4 9.5s ease-in-out infinite 1.8s; }

        .card-container {
            position: relative;
            z-index: 1;
        }

        .button-container {
            position: relative;
            z-index: 1;
        }

        .card-container {
            perspective: 1000px;
            width: 100%;
            max-width: 900px;
        }

        .card {
            position: relative;
            width: 100%;
            min-height: 500px;
            transform-style: preserve-3d;
            transition: transform 0.8s ease;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 10px;
        }

        .card-front {
            background: transparent;
            padding: 0;
        }

        .card-front img {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 10px;
            object-fit: contain;
        }

        .button-container {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-top: 100px;
        }

        .open-button, .close-button {
            background: white;
            color: #555;
            border: 2px solid #ddd;
            padding: 12px 30px;
            font-size: 22px;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Brush Script MT', cursive;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            transition: transform 0.2s, box-shadow 0.2s, opacity 0.3s;
        }

        .open-button:hover, .close-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);
        }

        .open-button:active, .close-button:active {
            transform: translateY(0);
        }

        .close-button {
            display: none;
        }

        .button-container.flipped .open-button {
            display: none;
        }

        .button-container.flipped .close-button {
            display: block;
        }

        .card-back {
            background: white;
            transform: rotateY(180deg);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            padding: 0;
        }

        .card-back img {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 10px;
            object-fit: contain;
        }

        @media (max-width: 900px) {
            .card-container {
                max-width: 600px;
            }

            .button-container {
                margin-top: 50px;
            }
        }
    </style>
</head>

        <div class="card" id="card">
            <div class="card-face card-front">
                <img src="../Hoc/New folder (2)/Happy Birthday.png" alt="Birthday Cats">
            </div>
            <div class="card-face card-back">
                <img src="../Hoc/New folder (2)/back 02.png" alt="Birthday Signatures">
            </div>
        </div>
    </div>
    <div class="button-container">
        <button class="open-button" onclick="openCard()">open here!</button>
        <button class="close-button" onclick="closeCard()">back</button>
    </div>

    <script>
        // Set card height based on image dimensions
        const img = document.querySelector('.card-front img');
        const card = document.getElementById('card');

        function setCardHeight() {
            const height = img.offsetHeight;
            card.style.height = height + 'px';
        }

        img.addEventListener('load', setCardHeight);
        window.addEventListener('resize', setCardHeight);

        // If image is already loaded
        if (img.complete) {
            setCardHeight();
        }

        function openCard() {
            document.getElementById('card').classList.add('flipped');
            document.querySelector('.button-container').classList.add('flipped');
        }

        function closeCard() {
            document.getElementById('card').classList.remove('flipped');
            document.querySelector('.button-container').classList.remove('flipped');
        }
    </script>
