        // Initialize audio context for sound effects
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // Play specific melodic sequence for final animation
        // Inspired by Einaudi's "Experience" - clear narrative arc
        function playFinalMelodyNote(index) {
            initAudio();

            const now = audioContext.currentTime;
            const duration = 2.2;

            // Melody with emotional arc: peaceful beginning → building → climax → resolution
            const melodySequence = [
                // BEGINNING - Peaceful and simple (measures 1-4)
                [220.00, 329.63, 440.00],    // Am: A3, E4, A4 - opening, tranquil
                [220.00, 329.63, 440.00],    // Am - establishing peace
                [174.61, 261.63, 349.23],    // F: F3, C4, F4 - gentle warmth
                [196.00, 293.66, 392.00],    // G: G3, D4, G4 - subtle lift

                // DEVELOPMENT - Adding emotion (measures 5-8)
                [220.00, 329.63, 440.00],    // Am - returning with feeling
                [261.63, 392.00, 523.25],    // C: C4, G4, C5 - brightening
                [293.66, 440.00, 587.33],    // Dm: D4, A4, D5 - deepening emotion
                [329.63, 493.88, 659.25],    // Em: E4, B4, E5 - rising intensity

                // CLIMAX - Emotional peak (measures 9-12)
                [349.23, 523.25, 698.46],    // F: F4, C5, F5 - powerful
                [392.00, 587.33, 783.99],    // G: G4, D5, G5 - soaring
                [440.00, 659.25, 880.00],    // Am: A4, E5, A5 - PEAK moment
                [392.00, 587.33, 783.99],    // G - sustaining the emotion

                // RESOLUTION - Gentle return home (measures 13-16)
                [349.23, 523.25, 698.46],    // F - beginning descent
                [261.63, 392.00, 523.25],    // C - calming down
                [293.66, 440.00, 587.33],    // Dm - settling
                [220.00, 329.63, 440.00],    // Am - peaceful resolution, home
            ];

            // Cycle through the melody sequence
            const notes = melodySequence[index % melodySequence.length];

            // Dynamic volume based on position in arc (crescendo to climax, then diminuendo)
            const arcPosition = index % melodySequence.length;
            let dynamicMultiplier = 1.0;
            if (arcPosition < 4) dynamicMultiplier = 0.7; // quiet beginning
            else if (arcPosition < 8) dynamicMultiplier = 0.9; // building
            else if (arcPosition < 12) dynamicMultiplier = 1.2; // climax (louder)
            else dynamicMultiplier = 0.8; // resolution (gentle)

            notes.forEach((frequency, noteIndex) => {
                const harmonics = [1, 2, 3, 4];
                const volumes = [1, 0.4, 0.25, 0.15];

                harmonics.forEach((harmonic, idx) => {
                    const osc = audioContext.createOscillator();
                    const gain = audioContext.createGain();

                    osc.type = 'sine';
                    osc.frequency.value = frequency * harmonic;

                    const volume = volumes[idx] * 0.028 * dynamicMultiplier;
                    const noteDelay = noteIndex * 0.05;

                    gain.gain.setValueAtTime(0, now + noteDelay);
                    gain.gain.linearRampToValueAtTime(volume, now + noteDelay + 0.025);
                    gain.gain.exponentialRampToValueAtTime(volume * 0.5, now + noteDelay + 0.25);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + noteDelay + duration);

                    osc.connect(gain);
                    gain.connect(audioContext.destination);

                    osc.start(now + noteDelay);
                    osc.stop(now + noteDelay + duration);
                });
            });
        }

        // Play mystical angelic harp sound
        function playHarpSound() {
            initAudio();

            const now = audioContext.currentTime;
            const duration = 2.0; // Longer for more ethereal, angelic sound

            // Mystical and angelic chord voicings - softer, more open intervals
            const angelicChords = [
                [261.63, 293.66, 392.00], // Csus2: C4, D4, G4 - open and airy
                [293.66, 392.00, 440.00], // Dsus4: D4, G4, A4 - suspended, dreamy
                [329.63, 392.00, 493.88], // Em: E4, G4, B4 - contemplative
                [220.00, 277.18, 329.63, 493.88], // Aadd9: A3, C#4, E4, B4 - shimmering
                [349.23, 440.00, 523.25], // Fmaj: F4, A4, C5 - warm and gentle
                [392.00, 440.00, 587.33], // Gsus2: G4, A4, D5 - floating
                [220.00, 261.63, 329.63, 392.00], // Am7: A3, C4, E4, G4 - mystical
                [293.66, 349.23, 440.00, 523.25], // Dm7: D4, F4, A4, C5 - introspective
                [246.94, 293.66, 369.99], // Bsus2: B3, D4, F#4 - ethereal
                [174.61, 220.00, 261.63], // Fsus2: F3, A3, C4 - deep and calm
                [196.00, 246.94, 293.66, 392.00], // Gmaj7: G3, B3, D4, G4 - celestial
                [164.81, 207.65, 261.63], // Esus2: E3, F#3, C4 - mysterious
                [233.08, 293.66, 349.23], // Bbsus2: Bb3, D4, F4 - soft
                [207.65, 261.63, 329.63], // Asus2: A3, C4, E4 - peaceful
                [277.18, 349.23, 440.00], // C#sus2: C#4, F4, A4 - dreamy
            ];

            // Random selection for unpredictable, mystical feel
            const randomIndex = Math.floor(Math.random() * angelicChords.length);
            const notes = angelicChords[randomIndex];

            notes.forEach((frequency, noteIndex) => {
                // Fewer harmonics for softer, more angelic tone
                const harmonics = [1, 2, 3, 4];
                const volumes = [1, 0.35, 0.2, 0.12];

                harmonics.forEach((harmonic, index) => {
                    const osc = audioContext.createOscillator();
                    const gain = audioContext.createGain();

                    osc.type = 'sine'; // Pure sine for softest, most angelic sound
                    osc.frequency.value = frequency * harmonic;

                    // Very soft volume for gentle, mystical atmosphere
                    const volume = volumes[index] * 0.022;
                    const noteDelay = noteIndex * 0.06; // Slower arpeggio for more ethereal feel

                    gain.gain.setValueAtTime(0, now + noteDelay);
                    gain.gain.linearRampToValueAtTime(volume, now + noteDelay + 0.02); // Gentler attack
                    gain.gain.exponentialRampToValueAtTime(volume * 0.5, now + noteDelay + 0.2); // Softer decay
                    gain.gain.exponentialRampToValueAtTime(0.001, now + noteDelay + duration);

                    osc.connect(gain);
                    gain.connect(audioContext.destination);

                    osc.start(now + noteDelay);
                    osc.stop(now + noteDelay + duration);
                });
            });
        }

        function startGame(level) {
            difficulty = level;
            const levelData = levels[level];

            // Switch screens
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';

            // Set up game
            document.getElementById('level-title').textContent = levelData.title;
            currentDot = 1;
            dots = levelData.dots;
            totalDots = dots.length;
            document.getElementById('total-dots').textContent = totalDots;
            document.getElementById('current-number').textContent = currentDot;

            // Clear and draw canvas
            const svg = document.getElementById('game-canvas');
            svg.innerHTML = '';
            lines = [];

            // Add cat detail image (only for medium/cat level)
            if (level === 'medium') {
                const catImage = document.createElementNS('http://www.w3.org/2000/svg', 'image');
                catImage.setAttribute('href', './assets/cat-outline.svg?v=3');
                catImage.setAttribute('x', '-460');
                catImage.setAttribute('y', '-451');
                catImage.setAttribute('width', '2374');
                catImage.setAttribute('height', '2157');
                catImage.setAttribute('preserveAspectRatio', 'xMidYMid meet');
                svg.appendChild(catImage);
            }

            // Colors from the animation
            const dotColors = ['#FFBC5F', '#7CD2E1', '#C1C325', '#FEB0D3', '#9C292B', '#4F2121'];

            // Draw dots with numbers
            dots.forEach((dot, index) => {
                const dotNumber = index + 1;

                // Pick a random color
                const randomColor = dotColors[Math.floor(Math.random() * dotColors.length)];

                // Create dot circle
                const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                circle.setAttribute('cx', dot.x);
                circle.setAttribute('cy', dot.y);
                circle.setAttribute('r', '11');
                circle.setAttribute('fill', randomColor);
                circle.classList.add('dot');
                circle.setAttribute('data-number', dotNumber);
                svg.appendChild(circle);

                // Create number label
                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', dot.x);
                text.setAttribute('y', dot.y - 10);
                text.setAttribute('text-anchor', 'middle');
                text.setAttribute('font-size', '11');
                text.classList.add('dot-number');
                text.textContent = dotNumber;
                svg.appendChild(text);
            });

            // Add drawing event listeners
            svg.addEventListener('mousedown', startDrawing);
            svg.addEventListener('mousemove', draw);
            svg.addEventListener('mouseup', stopDrawing);
            svg.addEventListener('mouseleave', stopDrawing);

            // Touch support for mobile
            svg.addEventListener('touchstart', handleTouchStart);
            svg.addEventListener('touchmove', handleTouchMove);
            svg.addEventListener('touchend', stopDrawing);
        }

        function startDrawing(event) {
            const target = event.target;

            // If clicking on the current dot, connect it first
            if (target.classList.contains('dot')) {
                const dotNumber = parseInt(target.getAttribute('data-number'));
                if (dotNumber === currentDot) {
                    isDrawing = true;
                    connectDot(target);
                    return;
                }
            }

            // Allow starting from anywhere on canvas if we have a last connected dot
            if (lastConnectedDot && currentDot <= totalDots) {
                isDrawing = true;
            }
        }

        function draw(event) {
            if (!isDrawing) return;

            const svg = document.getElementById('game-canvas');

            // Convert screen coordinates to SVG coordinates using SVG's built-in method
            const pt = svg.createSVGPoint();
            pt.x = event.clientX;
            pt.y = event.clientY;
            const svgP = pt.matrixTransform(svg.getScreenCTM().inverse());
            const x = svgP.x;
            const y = svgP.y;

            // Add point to trail (only if moved enough to avoid too many points)
            if (trailPoints.length === 0 ||
                Math.abs(trailPoints[trailPoints.length - 1].x - x) > 10 ||
                Math.abs(trailPoints[trailPoints.length - 1].y - y) > 10) {
                trailPoints.push({x, y});
            }

            // Update or create current drawing trail
            if (currentLine) {
                // Update polyline with all trail points
                const pointsString = trailPoints.map(p => `${p.x},${p.y}`).join(' ');
                currentLine.setAttribute('points', pointsString);
            } else if (lastConnectedDot) {
                // Create temporary trail from last dot
                trailPoints = [{x: lastConnectedDot.x, y: lastConnectedDot.y}, {x, y}];
                currentLine = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
                const pointsString = trailPoints.map(p => `${p.x},${p.y}`).join(' ');
                currentLine.setAttribute('points', pointsString);
                currentLine.classList.add('line');
                currentLine.style.opacity = '0.5';
                currentLine.style.fill = 'none';
                svg.appendChild(currentLine);
            }

            // Check if hovering over the next dot
            const target = document.elementFromPoint(event.clientX, event.clientY);
            if (target && target.classList.contains('dot')) {
                const dotNumber = parseInt(target.getAttribute('data-number'));
                if (dotNumber === currentDot) {
                    connectDot(target);
                }
            }
        }

        function handleTouchStart(event) {
            event.preventDefault();
            const touch = event.touches[0];
            const target = document.elementFromPoint(touch.clientX, touch.clientY);

            // If touching the current dot, connect it first
            if (target && target.classList.contains('dot')) {
                const dotNumber = parseInt(target.getAttribute('data-number'));
                if (dotNumber === currentDot) {
                    isDrawing = true;
                    connectDot(target);
                    return;
                }
            }

            // Allow starting from anywhere on canvas if we have a last connected dot
            if (lastConnectedDot && currentDot <= totalDots) {
                isDrawing = true;
            }
        }

        function handleTouchMove(event) {
            event.preventDefault();
            if (!isDrawing) return;

            const touch = event.touches[0];
            const svg = document.getElementById('game-canvas');

            // Convert screen coordinates to SVG coordinates using SVG's built-in method
            const pt = svg.createSVGPoint();
            pt.x = touch.clientX;
            pt.y = touch.clientY;
            const svgP = pt.matrixTransform(svg.getScreenCTM().inverse());
            const x = svgP.x;
            const y = svgP.y;

            // Add point to trail
            if (trailPoints.length === 0 ||
                Math.abs(trailPoints[trailPoints.length - 1].x - x) > 10 ||
                Math.abs(trailPoints[trailPoints.length - 1].y - y) > 10) {
                trailPoints.push({x, y});
            }

            // Update or create current drawing trail
            if (currentLine) {
                const pointsString = trailPoints.map(p => `${p.x},${p.y}`).join(' ');
                currentLine.setAttribute('points', pointsString);
            } else if (lastConnectedDot) {
                trailPoints = [{x: lastConnectedDot.x, y: lastConnectedDot.y}, {x, y}];
                currentLine = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
                const pointsString = trailPoints.map(p => `${p.x},${p.y}`).join(' ');
                currentLine.setAttribute('points', pointsString);
                currentLine.classList.add('line');
                currentLine.style.opacity = '0.5';
                currentLine.style.fill = 'none';
                svg.appendChild(currentLine);
            }

            // Check if hovering over the next dot
            const target = document.elementFromPoint(touch.clientX, touch.clientY);
            if (target && target.classList.contains('dot')) {
                const dotNumber = parseInt(target.getAttribute('data-number'));
                if (dotNumber === currentDot) {
                    connectDot(target);
                }
            }
        }

        function stopDrawing() {
            isDrawing = false;
            if (currentLine) {
                currentLine.remove();
                currentLine = null;
            }
            trailPoints = [];
        }

        function connectDot(dotElement) {
            const dotNumber = parseInt(dotElement.getAttribute('data-number'));

            // Play random mystical harp sound
            playHarpSound();

            // Mark dot as connected
            dotElement.classList.add('connected');

            // Draw permanent trail to this dot (if not the first dot)
            if (currentDot > 1) {
                const svg = document.getElementById('game-canvas');

                // Get current and previous dot elements to extract colors
                const currentDotElement = dotElement;
                const previousDotElement = svg.querySelector(`.dot[data-number="${currentDot - 1}"]`);

                const currentDotColor = currentDotElement.getAttribute('fill');
                const previousDotColor = previousDotElement.getAttribute('fill');

                // Get exact coordinates of both dots
                const currentDotX = parseFloat(currentDotElement.getAttribute('cx'));
                const currentDotY = parseFloat(currentDotElement.getAttribute('cy'));
                const previousDotX = parseFloat(previousDotElement.getAttribute('cx'));
                const previousDotY = parseFloat(previousDotElement.getAttribute('cy'));

                // Remove temporary line if it exists
                if (currentLine) {
                    currentLine.remove();
                    currentLine = null;
                }

                // Create unique gradient for this line
                const gradientId = `gradient-${currentDot - 1}-${currentDot}`;
                const gradient = document.createElementNS('http://www.w3.org/2000/svg', 'linearGradient');
                gradient.setAttribute('id', gradientId);
                gradient.setAttribute('x1', previousDotX);
                gradient.setAttribute('y1', previousDotY);
                gradient.setAttribute('x2', currentDotX);
                gradient.setAttribute('y2', currentDotY);
                gradient.setAttribute('gradientUnits', 'userSpaceOnUse');

                const stop1 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
                stop1.setAttribute('offset', '0%');
                stop1.setAttribute('stop-color', previousDotColor);

                const stop2 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
                stop2.setAttribute('offset', '100%');
                stop2.setAttribute('stop-color', currentDotColor);

                gradient.appendChild(stop1);
                gradient.appendChild(stop2);
                svg.appendChild(gradient);

                // Create permanent straight line from previous dot to current dot
                const permanentLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                permanentLine.setAttribute('x1', previousDotX);
                permanentLine.setAttribute('y1', previousDotY);
                permanentLine.setAttribute('x2', currentDotX);
                permanentLine.setAttribute('y2', currentDotY);
                permanentLine.classList.add('line');
                permanentLine.setAttribute('stroke', `url(#${gradientId})`);
                permanentLine.style.fill = 'none';
                permanentLine.style.opacity = '1';
                svg.insertBefore(permanentLine, svg.firstChild);
                lines.push(permanentLine);

                trailPoints = [];
            }

            // Update last connected dot position
            lastConnectedDot = dots[currentDot - 1];

            // Move to next dot
            currentDot++;
            document.getElementById('current-number').textContent = currentDot;

            // Check if completed
            if (currentDot > totalDots) {
                stopDrawing();
                completeGame();
            }
        }

        function completeGame() {
            const svg = document.getElementById('game-canvas');
            const allDots = svg.querySelectorAll('.dot');
            const allNumbers = svg.querySelectorAll('.dot-number');

            // Animate dots with pulse effect one by one
            let delay = 0;
            allDots.forEach((dot, index) => {
                setTimeout(() => {
                    const originalRadius = parseFloat(dot.getAttribute('r'));

                    // Play specific melody note from composed sequence
                    playFinalMelodyNote(index);

                    // Grow animation
                    dot.style.transition = 'all 0.15s ease-out';
                    dot.setAttribute('r', originalRadius * 1.6);

                    // Shrink back to original
                    setTimeout(() => {
                        dot.style.transition = 'all 0.15s ease-in';
                        dot.setAttribute('r', originalRadius);
                    }, 150);

                    // If this is the last dot, transition to final image
                    if (index === allDots.length - 1) {
                        setTimeout(() => {
                            // Hide all dots and numbers
                            allDots.forEach(d => d.style.opacity = '0');
                            allNumbers.forEach(n => n.style.opacity = '0');

                            // Hide lines with fade out
                            lines.forEach(line => {
                                line.style.transition = 'opacity 0.5s ease';
                                line.style.opacity = '0';
                            });

                            // Hide the background cat outline image
                            const bgImage = svg.querySelector('image');
                            if (bgImage) {
                                bgImage.style.transition = 'opacity 0.5s ease';
                                bgImage.style.opacity = '0';
                            }

                            // Show final cat image with fade in
                            setTimeout(() => {
                                const finalImage = document.createElementNS('http://www.w3.org/2000/svg', 'image');
                                finalImage.setAttribute('href', './assets/cat-outline-final.svg?v=2');
                                finalImage.setAttribute('x', '-460');
                                finalImage.setAttribute('y', '-451');
                                finalImage.setAttribute('width', '2374');
                                finalImage.setAttribute('height', '2157');
                                finalImage.setAttribute('preserveAspectRatio', 'xMidYMid meet');
                                finalImage.style.opacity = '0';
                                finalImage.style.transition = 'opacity 1s ease';
                                svg.appendChild(finalImage);

                                // Trigger fade in
                                setTimeout(() => {
                                    finalImage.style.opacity = '1';
                                }, 50);
                            }, 500);
                        }, 400);
                    }
                }, delay);
                delay += 60; // 60ms delay between each dot for melodic flow
            });
        }

        function backToMenu() {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('menu-screen').style.display = 'flex';
            document.getElementById('completion-message').style.display = 'none';

            // Reset drawing state
            isDrawing = false;
            currentLine = null;
            lastConnectedDot = null;
        }

        // Parallax effect for level icons
        document.addEventListener('mousemove', (e) => {
            const icons = document.querySelectorAll('.level-icon');
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;

            const deltaX = (e.clientX - centerX) / centerX;
            const deltaY = (e.clientY - centerY) / centerY;

            icons.forEach(icon => {
                const moveX = deltaX * 10; // Adjust multiplier for stronger/weaker effect
                const moveY = deltaY * 10;
                icon.style.transform = `translate(calc(-50% + ${moveX}px), calc(-50% + ${moveY}px))`;
            });
        });

        // Background animation for menu screen
        const canvas = document.getElementById('background-canvas');
        const ctx = canvas.getContext('2d');
        let animationDots = [];
        let animationRunning = false;
        let connectionProgress = {};

        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;

            // Set the actual size in memory (scaled to account for extra pixel density)
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;

            // Set the display size (CSS pixels)
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';

            // Scale the context to account for devicePixelRatio
            ctx.scale(dpr, dpr);
        }

        // Initialize animated dots
        function initAnimatedDots() {
            animationDots = [];
            const numDots = 45;
            const colors = ['#FFBC5F', '#7CD2E1', '#C1C325', '#FEB0D3', '#9C292B', '#4F2121'];

            for (let i = 1; i <= numDots; i++) {
                const radius = 15;
                const margin = 30; // Extra margin to keep dots well inside
                animationDots.push({
                    number: i,
                    x: Math.random() * (window.innerWidth + 800) - 200,
                    y: margin + Math.random() * (window.innerHeight - margin * 2),
                    speed: 0.8 + Math.random() * 1.2,
                    radius: radius,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    connected: false
                });
            }
        }

        // Draw animated background
        function drawAnimatedBackground() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Move dots
            animationDots.forEach(dot => {
                dot.x -= dot.speed;

                // Reset dot when it goes off screen
                if (dot.x < -50) {
                    const margin = 30;
                    dot.x = window.innerWidth + 50;
                    dot.y = margin + Math.random() * (window.innerHeight - margin * 2);
                    dot.connected = false;
                }
            });

            // Draw lines connecting consecutive numbers with longer sequences
            ctx.lineWidth = 2;
            ctx.globalAlpha = 0.6;

            for (let i = 0; i < animationDots.length - 1; i++) {
                const startDot = animationDots[i];

                if (startDot.x < -50 || startDot.x > window.innerWidth + 50) continue;

                // Try to create sequences of 2-5 connected dots
                const maxSequenceLength = Math.min(5, animationDots.length - i);
                let sequenceLength = 1;

                // Check how many consecutive dots are close enough to connect
                for (let j = 1; j < maxSequenceLength; j++) {
                    const currentDot = animationDots[i + j - 1];
                    const nextDot = animationDots[i + j];

                    const distance = Math.sqrt(
                        Math.pow(nextDot.x - currentDot.x, 2) +
                        Math.pow(nextDot.y - currentDot.y, 2)
                    );

                    if (distance < 650) {
                        sequenceLength = j + 1;
                    } else {
                        break;
                    }
                }

                const connectionKey = `${i}-${sequenceLength}`;

                // Draw the sequence if it has at least 2 dots
                if (sequenceLength >= 2) {
                    // Initialize or update connection progress
                    if (!connectionProgress[connectionKey]) {
                        connectionProgress[connectionKey] = 0;
                    }
                    connectionProgress[connectionKey] = Math.min(1, connectionProgress[connectionKey] + 0.05);

                    // Use a gradient of colors from the dots in the sequence
                    const gradient = ctx.createLinearGradient(
                        animationDots[i].x,
                        animationDots[i].y,
                        animationDots[i + sequenceLength - 1].x,
                        animationDots[i + sequenceLength - 1].y
                    );
                    gradient.addColorStop(0, animationDots[i].color);
                    gradient.addColorStop(1, animationDots[i + sequenceLength - 1].color);
                    ctx.strokeStyle = gradient;

                    ctx.beginPath();
                    ctx.moveTo(animationDots[i].x, animationDots[i].y);

                    // Draw organic curves between points
                    for (let j = 1; j < sequenceLength; j++) {
                        const progress = connectionProgress[connectionKey];
                        const segmentProgress = Math.max(0, Math.min(1, (progress * sequenceLength) - j + 1));

                        if (segmentProgress > 0) {
                            const currentDot = animationDots[i + j - 1];
                            const nextDot = animationDots[i + j];

                            // Calculate control point for organic curve
                            const midX = (currentDot.x + nextDot.x) / 2;
                            const midY = (currentDot.y + nextDot.y) / 2;

                            // Add slight curve offset perpendicular to the line
                            const dx = nextDot.x - currentDot.x;
                            const dy = nextDot.y - currentDot.y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            const curveFactor = dist * 0.1; // Curve intensity

                            // Use dot numbers to create consistent but varied curves
                            const curveVariation = Math.sin(currentDot.number * 0.5) * 0.7 + 0.3;

                            const controlX = midX + (-dy / dist) * curveFactor * curveVariation;
                            const controlY = midY + (dx / dist) * curveFactor * curveVariation;

                            // Interpolate to show progressive drawing
                            const targetX = currentDot.x + (nextDot.x - currentDot.x) * segmentProgress;
                            const targetY = currentDot.y + (nextDot.y - currentDot.y) * segmentProgress;
                            const targetCtrlX = currentDot.x + (controlX - currentDot.x) * segmentProgress;
                            const targetCtrlY = currentDot.y + (controlY - currentDot.y) * segmentProgress;

                            ctx.quadraticCurveTo(targetCtrlX, targetCtrlY, targetX, targetY);
                        }
                    }

                    ctx.stroke();
                } else {
                    // Gradually fade out disconnected sequences
                    if (connectionProgress[connectionKey] && connectionProgress[connectionKey] > 0) {
                        connectionProgress[connectionKey] = Math.max(0, connectionProgress[connectionKey] - 0.05);

                        // Draw the fading connection
                        const gradient = ctx.createLinearGradient(
                            animationDots[i].x,
                            animationDots[i].y,
                            animationDots[Math.min(i + 1, animationDots.length - 1)].x,
                            animationDots[Math.min(i + 1, animationDots.length - 1)].y
                        );
                        gradient.addColorStop(0, animationDots[i].color);
                        gradient.addColorStop(1, animationDots[Math.min(i + 1, animationDots.length - 1)].color);
                        ctx.strokeStyle = gradient;

                        ctx.globalAlpha = 0.6 * connectionProgress[connectionKey];

                        ctx.beginPath();
                        ctx.moveTo(animationDots[i].x, animationDots[i].y);

                        const nextDot = animationDots[Math.min(i + 1, animationDots.length - 1)];
                        const currentDot = animationDots[i];

                        const midX = (currentDot.x + nextDot.x) / 2;
                        const midY = (currentDot.y + nextDot.y) / 2;
                        const dx = nextDot.x - currentDot.x;
                        const dy = nextDot.y - currentDot.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const curveFactor = dist * 0.1;
                        const curveVariation = Math.sin(currentDot.number * 0.5) * 0.7 + 0.3;
                        const controlX = midX + (-dy / dist) * curveFactor * curveVariation;
                        const controlY = midY + (dx / dist) * curveFactor * curveVariation;

                        const progress = connectionProgress[connectionKey];
                        const targetX = currentDot.x + (nextDot.x - currentDot.x) * progress;
                        const targetY = currentDot.y + (nextDot.y - currentDot.y) * progress;
                        const targetCtrlX = currentDot.x + (controlX - currentDot.x) * progress;
                        const targetCtrlY = currentDot.y + (controlY - currentDot.y) * progress;

                        ctx.quadraticCurveTo(targetCtrlX, targetCtrlY, targetX, targetY);
                        ctx.stroke();

                        ctx.globalAlpha = 0.6;

                        // Clean up when fully faded
                        if (connectionProgress[connectionKey] <= 0) {
                            delete connectionProgress[connectionKey];
                        }
                    }
                }
            }

            // Draw dots
            ctx.globalAlpha = 1.0;
            animationDots.forEach(dot => {
                if (dot.x < window.innerWidth + 50 && dot.x > -50) {
                    // Draw circle with its unique color
                    ctx.fillStyle = dot.color;
                    ctx.beginPath();
                    ctx.arc(dot.x, dot.y, dot.radius, 0, Math.PI * 2);
                    ctx.fill();

                    // Draw number
                    ctx.fillStyle = '#2D461F';
                    ctx.font = '14px "DM Sans", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(dot.number, dot.x + 23, dot.y);
                }
            });

            if (animationRunning) {
                requestAnimationFrame(drawAnimatedBackground);
            }
        }

        // Start/stop animation based on which screen is visible
        function startBackgroundAnimation() {
            if (!animationRunning) {
                animationRunning = true;
                resizeCanvas();
                initAnimatedDots();
                drawAnimatedBackground();
            }
        }

        function stopBackgroundAnimation() {
            animationRunning = false;
        }

        // Initialize on load
        window.addEventListener('load', () => {
            resizeCanvas();
            startBackgroundAnimation();
        });

        window.addEventListener('resize', () => {
            if (animationRunning) {
                resizeCanvas();
            }
        });

        // Override startGame to stop animation
        const originalStartGame = startGame;
        startGame = function(level) {
            stopBackgroundAnimation();
            originalStartGame(level);
        };

        // Override backToMenu to restart animation
        const originalBackToMenu = backToMenu;
        backToMenu = function() {
            originalBackToMenu();
            startBackgroundAnimation();
        };
    </script>
</body>
